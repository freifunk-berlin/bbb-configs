---
# Important!
# With dlink_covr-x1860-a1 mesh_only does not work. Channel 13 has 'no IR' set
# this means no initial radiation. The mesh only starts with an additional AP
target: ramips/mt7621
brand_nice: D-Link
model_nice: COVR-X1860
version_nice: A1
openwrt_version: 25.12-SNAPSHOT

dsa_ports:
  - internet
  - ethernet

# Mac address can be read with the following command:
# cat /dev/mtdblock$(grep -w 'config2' /proc/mtd | sed -n 's/^mtd\([0-9]\+\):.*/\1/p') | grep -o 'factory_mac=[^ ]*' | cut -d= -f2
requires_mac_override: true

wireless_devices:
  - name: 11a_standard
    band: 5g
    htmode_prefix: HE
    path: 1e140000.pcie/pci0000:00/0000:00:01.0/0000:02:00.0+1
    ifname_hint: wlan5
  - name: 11g_standard
    band: 2g
    htmode_prefix: HE
    path: 1e140000.pcie/pci0000:00/0000:00:01.0/0000:02:00.0
    ifname_hint: wlan2
