---

all__channel_assignments_11a_standard__to_merge:
  default: "36-20"

all__channel_assignments_11g_standard__to_merge:
  default: "13-20"

all__channel_assignments_11a_mesh__to_merge:
  default: "36-20"

all__wireless_profiles__to_merge:
  - name: disable
    devices:
      - radio: 11a_standard
        disabled: true
      - radio: 11g_standard
        disabled: true
      - radio: 11a_mesh
        disabled: true

  - name: mesh_only
    ifaces:
      - mode: mesh
        mesh_id: Mesh-Freifunk-Berlin
        radio: [11a_standard, 11g_standard, 11a_mesh]
        mcast_rate: 12000
        mesh_fwding: 0
        mesh_nolearn: 1
        ifname_hint: mesh

  - name: ap_only
    ifaces:
      - mode: ap
        ssid: berlin.freifunk.net
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      - mode: ap
        ssid: berlin.freifunk.net Encrypted
        encryption: owe
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ffowe
        ieee80211w: 2

  - name: freifunk_default
    ifaces:
      - mode: ap
        ssid: berlin.freifunk.net
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      - mode: ap
        ssid: berlin.freifunk.net Encrypted
        encryption: owe
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ffowe
        ieee80211w: 2

      - mode: mesh
        mesh_id: Mesh-Freifunk-Berlin
        radio: [11a_standard, 11g_standard, 11a_mesh]
        mcast_rate: 12000
        mesh_fwding: 0
        mesh_nolearn: 1
        ifname_hint: mesh

  - name: freifunk_fw
    ifaces:
      - mode: ap
        ssid: fuerstenwalde.freifunk.net
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      # - mode: ap
      #   ssid: fuerstenwalde.freifunk.net Encrypted
      #   encryption: owe
      #   network: dhcp
      #   radio: [11a_standard, 11g_standard]
      #   ifname_hint: ffowe
      #   ieee80211w: 2

      - mode: mesh
        mesh_id: Mesh-Freifunk
        radio: [11a_standard, 11g_standard, 11a_mesh]
        mcast_rate: 12000
        mesh_fwding: 0
        mesh_nolearn: 1
        ifname_hint: mesh

  - name: freifunk_hacrafu
    ifaces:
      - mode: ap
        ssid: freifunk.hacrafu.de
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      # - mode: ap
      #   ssid: freifunk.hacrafu.de owe
      #   encryption: owe
      #   network: dhcp
      #   radio: [11a_standard, 11g_standard]
      #   ifname_hint: ffowe
      #   ieee80211w: 2

      - mode: mesh
        mesh_id: Mesh-Freifunk-Berlin
        radio: [11a_standard, 11g_standard, 11a_mesh]
        mcast_rate: 12000
        mesh_fwding: 0
        mesh_nolearn: 1
        ifname_hint: mesh

  - name: freifunk_hacrafu_ap_only
    ifaces:
      - mode: ap
        ssid: freifunk.hacrafu.de
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      # - mode: ap
      #   ssid: freifunk.hacrafu.de owe
      #   encryption: owe
      #   network: dhcp
      #   radio: [11a_standard, 11g_standard]
      #   ifname_hint: ffowe
      #   ieee80211w: 2

  # APuP (Access Point Micro Peering) profiles
  # APuP uses standard AP mode with 4-address WDS peering - all APs share the same SSID
  # and hostapd dynamically creates per-peer interfaces (e.g. phy0-mesh.sta0, phy0-mesh.sta1).
  # These peer interfaces are fed to Babel for routing. No kernel/driver changes required,
  # only AP mode + 4-address mode support needed.
  # To use: set wireless_profile to one of these and add mesh_type: apup to mesh network definitions.

  - name: mesh_only_apup
    ifaces:
      - mode: apup
        ssid: Mesh-Freifunk-Berlin
        encryption: none
        radio: [11a_standard, 11g_standard, 11a_mesh]
        ifname_hint: mesh

  - name: freifunk_default_apup
    ifaces:
      - mode: ap
        ssid: berlin.freifunk.net
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      - mode: ap
        ssid: berlin.freifunk.net Encrypted
        encryption: owe
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ffowe
        ieee80211w: 2

      - mode: apup
        ssid: Mesh-Freifunk-Berlin
        encryption: none
        radio: [11a_standard, 11g_standard, 11a_mesh]
        ifname_hint: mesh

  - name: freifunk_fw_apup
    ifaces:
      - mode: ap
        ssid: fuerstenwalde.freifunk.net
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      - mode: apup
        ssid: Mesh-Freifunk
        encryption: none
        radio: [11a_standard, 11g_standard, 11a_mesh]
        ifname_hint: mesh

  - name: freifunk_hacrafu_apup
    ifaces:
      - mode: ap
        ssid: freifunk.hacrafu.de
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff

      - mode: apup
        ssid: Mesh-Freifunk-Berlin
        encryption: none
        radio: [11a_standard, 11g_standard, 11a_mesh]
        ifname_hint: mesh
