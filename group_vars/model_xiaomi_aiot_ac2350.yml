---
target: ath79/generic
brand_nice: Xiaomi
model_nice: AIoT AC2350
version_nice: v1
openwrt_version: 25.12-SNAPSHOT

dsa_ports:
  - eth0.1 # LAN 1-3
  - eth0.2 # WAN

wireless_devices:
  - name: 11a_standard
    band: 5g
    htmode_prefix: VHT
    path: pci0000:00/0000:00:00.0
    ifname_hint: wlan5
  - name: 11g_standard
    band: 2g
    htmode_prefix: HT
    path: platform/ahb/18100000.wmac
    ifname_hint: wlan2
