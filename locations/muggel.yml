---

location: muggel
location_nice: Müggelspree
latitude: 52.42612
longitude: 13.71208
contact_nickname: Packet Please
contacts:
  - pktpls@systemli.org

# 10.31.220.0/26
# 10.31.220.0/29 - mgmt
# 10.31.220.8/29 - mesh + uplink
# 10.31.220.16/28 - prdhcp not used
# 10.31.220.32/27 - dhcp
ipv6_prefix: 2001:bf7:840:1100::/56

hosts:
  - hostname: muggel-core
    role: corerouter
    model: cudy_wr3000e-v1
    openwrt_version: snapshot
    flow_offload: hw
    wireless_profile: muggel
    host__rclocal__to_merge:
      - |
        uci set network.vlan_40.ports='lan1:u lan2:u lan3:u lan4:u'
        uci set network.vlan_50.ports='wan:u'
        uci commit network; reload_config
      - cat /etc/crontabs/root | grep "ifdown wan" 2>/dev/null || echo "0 6 * * * ip netns exec uplink ssh -yy root@192.168.1.1 'ifdown wan ; sleep 5 ; ifup wan'" >> /etc/crontabs/root && /etc/init.d/cron restart

networks:
  - vid: 20
    role: mesh
    name: mesh_core
    prefix: 10.31.220.8/32
    ipv6_subprefix: 20
    mesh_ap: muggel-core
    mesh_radio: 11a_standard
    mesh_iface: mesh

  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.31.220.32/27
    ipv6_subprefix: 40
    assignments:
      muggel-core: 1

  - vid: 42
    role: mgmt
    prefix: 10.31.220.0/29
    gateway: 1
    dns: 1
    ipv6_subprefix: 42
    assignments:
      muggel-core: 1
      muggel-uplink: 2

  # Uplink at 192.168.1.1 is a Zyxel NR7101 running vanilla OpenWrt
  # For modem setup:
  #   apk add kmod-usb-net kmod-usb-net-cdc-ether kmod-usb-net-cdc-mbim kmod-usb-net-cdc-ncm umbim wwan
  #   uci batch "
  #     network.wan=interface
  #     network.wan.proto='mbim'
  #     network.wan.device='/dev/cdc-wdm0'
  #     network.wan.apn='internet'
  #     network.wan.auth='none'
  #     network.wan.pdptype='ipv4v6'"
  # For modem status info:
  #   modeminfo script from https://github.com/solomonricky/luci-app-modeminfo
  #   apk add sms-tool
  #   /root/modeminfo.sh | grep -E 'Network|Signal|SINR|Band'
  # Modem status:
  #   ssh root@muggel-core.ff ip netns exec uplink \
  #     ssh -yy root@192.168.1.1 /root/modeminfo.sh \
  #   | grep -E 'Network|Signal|SINR|Band'
  - vid: 50
    untagged: true
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1420
    prefix: 10.31.220.10/32
    wireguard_port: 51820

# Standard open SSID with OWE Transition Mode.
# For roaming between multiple APs, consider setting 80211w to optional (1).
location__wireless_profiles__to_merge:
  - name: muggel
    ifaces:
      - mode: ap
        ssid: berlin.freifunk.net
        encryption: none
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ff
        owe_transition_ifname_hint: ffowe
      - mode: ap
        ssid: berlin.freifunk.net OWE
        hidden: true
        encryption: owe
        network: dhcp
        radio: [11a_standard, 11g_standard]
        ifname_hint: ffowe
        owe_transition_ifname_hint: ff
        ieee80211w: 2
      - mode: mesh
        mesh_id: Mesh-Freifunk-Berlin
        radio: [11a_standard, 11g_standard, 11a_mesh]
        mcast_rate: 12000
        mesh_fwding: 0
        mesh_nolearn: 1
        ifname_hint: mesh

location__channel_assignments_11a_standard__to_merge:
  muggel-core: 36-40
