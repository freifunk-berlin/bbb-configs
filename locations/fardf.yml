# ---108: 10.31.54.124/30   - sued
# ---109: 10.31.104.212/30  - rudi

ipv6_prefix: ""

networks:
  # DHCP
  - vid: 10
    role: dhcp
    prefix: 10.31.54.64/27
    ipv6_subprefix: 0
    untagged: true
    inbound_filtering: false
    enforce_client_isolation: false
    # This reflects the current IP configuration
    gateway: 2
    dns: 2
    assignments:
      fardf-core: 2    # 10.31.54.66 - current core ip
      fardf-switch: 3  # 10.31.54.67

  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.31.54.100/32
    ipv6_subprefix: -20
    mesh_ap: fardf-core
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.31.54.101/32
    ipv6_subprefix: -21
    mesh_ap: fardf-core
    mesh_radio: 11g_standard
    mesh_iface: mesh

