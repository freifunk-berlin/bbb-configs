---

location: hacrafu-capelvenere
location_nice: Dorfstraße 67, 15370 Petershagen
latitude: 52.52378014492899
longitude: 13.77018973303644
contact_name: "Hacken Craften Funken e.V."
contact_nickname: "HaCraFu e.V."
contacts:
  - "freifunk@hacrafu.de"

hosts:
  - hostname: hacrafu-capelvenere
    role: corerouter
    model: "cudy_wr3000h-v1"
    wireless_profile: freifunk_hacrafu
    host__rclocal__to_merge:
      - |
        uci set network.vlan_22.ports='lan1:t lan2:t lan3:t lan4:t'
        uci set network.vlan_23.ports='lan1:t lan2:t lan3:t lan4:t'
        uci set network.vlan_24.ports='lan1:t lan2:t lan3:t lan4:t'
        uci set network.vlan_25.ports='lan1:t lan2:t lan3:t lan4:t'
        uci set network.vlan_40.ports='lan1:t lan2:u lan3:u lan4:u'
        uci set network.vlan_42.ports='lan1:t lan2:t lan3:t lan4:t'
        uci set network.vlan_50.ports='wan:u'
        uci commit network; reload_config

  - hostname: hacrafu-capelvenere-dap
    role: ap
    model: "dlink_dap-x1860-a1"
    wireless_profile: freifunk_hacrafu

  - hostname: hacrafu-capelvenere-range
    role: ap
    model: "cudy_ap3000outdoor-v1"
    wireless_profile: freifunk_hacrafu

  - hostname: hacrafu-capelvenere-dungeon
    role: ap
    model: "genexis_pulse-ex400"
    wireless_profile: freifunk_hacrafu_ap_only

ipv6_prefix: "2001:bf7:850:3a00::/56"

# DHCP      10.248.54.32/27
# MESH      10.248.50.8/29
# MGMT      10.248.54.16/29
# TUNNEL    10.248.50.2/31

networks:
  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.248.50.8/32
    ipv6_subprefix: -20
    mesh_ap: hacrafu-capelvenere
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.248.50.9/32
    ipv6_subprefix: -21
    mesh_ap: hacrafu-capelvenere
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 5 GHz 802.11s - dap
  - vid: 22
    role: mesh
    name: mesh_5g_dap
    prefix: 10.248.50.10/32
    ipv6_subprefix: -22
    mesh_ap: hacrafu-capelvenere-dap
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - dap
  - vid: 23
    role: mesh
    name: mesh_2g_dap
    prefix: 10.248.50.11/32
    ipv6_subprefix: -23
    mesh_ap: hacrafu-capelvenere-dap
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # MESH - 5 GHz 802.11s - range
  - vid: 24
    role: mesh
    name: mesh_5g_rgn
    prefix: 10.248.50.12/32
    ipv6_subprefix: -24
    mesh_ap: hacrafu-capelvenere-range
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s - range
  - vid: 25
    role: mesh
    name: mesh_2g_rgn
    prefix: 10.248.50.13/32
    ipv6_subprefix: -25
    mesh_ap: hacrafu-capelvenere-range
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: false
    enforce_client_isolation: false
    prefix: 10.248.54.32/27
    ipv6_subprefix: 0
    assignments:
      hacrafu-capelvenere: 1  # 33
      ffpi: 2  # 34
      tompi: 3  # 35
      deb: 4  # 36
      pi-hacrafu: 5  # 37

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.248.54.16/29
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hacrafu-capelvenere: 1  # 17
      hacrafu-capelvenere-dap: 2  # 18
      hacrafu-capelvenere-dungeon: 3  # 19
      hacrafu-capelvenere-range: 4  # 20
      hacrafu-capelvenere-switch-fritz: 5  # 21
      hacrafu-capelvenere-switch-roof: 6  # 22

  # UPLINK
  - vid: 50
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.248.50.2/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.248.50.3/32
    wireguard_port: 51821

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hacrafu-capelvenere: 36-40
  hacrafu-capelvenere-dap: 44-40
  hacrafu-capelvenere-range: 36-40
  hacrafu-capelvenere-dungeon: 44-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hacrafu-capelvenere: 13-20
  hacrafu-capelvenere-dap: 1-20
  hacrafu-capelvenere-range: 13-20
  hacrafu-capelvenere-dungeon: 1-20

