---
location: hdk-88m
location_nice: Heidekampgraben 88m
latitude: 52.478186679
longitude: 13.47312212
community: true

hosts:
  - hostname: hdk-88m
    role: corerouter
    model: "dlink_dap-x1860-a1"
    wireless_profile: freifunk_default

ipv6_prefix: '2001:bf7:840:4c00::/56'

# --MGMT: 10.248.53.40/30
# --MESH: 10.248.53.148/32 10.248.53.149/32
# --DHCP: 10.248.52.0/28

# Disable noping
dhcp_no_ping: false

networks:
  # MESH - 5 GHz 802.11s
  - vid: 20
    role: mesh
    name: mesh_5g
    prefix: 10.248.53.148/32
    ipv6_subprefix: -20
    mesh_ap: hdk-88m
    mesh_radio: 11a_standard
    mesh_iface: mesh

  # MESH - 2.4 GHz 802.11s
  - vid: 21
    role: mesh
    name: mesh_2g
    prefix: 10.248.53.149/32
    ipv6_subprefix: -21
    mesh_ap: hdk-88m
    mesh_radio: 11g_standard
    mesh_iface: mesh

  # DHCP with filtering and isolation
  - vid: 40
    role: dhcp
    untagged: true
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.248.52.0/28
    ipv6_subprefix: 0
    assignments:
      hdk-88m: 1

  # MGMT
  - vid: 42
    role: mgmt
    prefix: 10.248.53.40/30
    gateway: 1
    dns: 1
    ipv6_subprefix: 1
    assignments:
      hdk-88m: 1

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  hdk-88m: 36-40

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  hdk-88m: 13-20
