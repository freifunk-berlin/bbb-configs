ipv6_prefix: 2001:bf7:830:d600::/56

networks:

- vid: 10
  role: mesh
  name: mesh_emma
  prefix: 10.248.31.177/32 # use e.g. the first mesh IP
  ipv6_subprefix: -10

# MESH - 5 GHz 802.11s
- vid: 20
  role: mesh
  name: mesh_5g_core
  prefix: 10.248.31.178/32
  ipv6_subprefix: -20
  mesh_ap: vinet-xberg-r2am-core
  mesh_radio: 11a_standard
  mesh_iface: mesh

# MESH - 2.4 GHz 802.11s
- vid: 21
  role: mesh
  name: mesh_2g_core
  prefix: 10.248.31.179/32
  ipv6_subprefix: -21
  # make mesh_metric for 2GHz worse than 5GHz
  mesh_metric_lqm: [ 'default 0.8' ]
  mesh_ap: vinet-xberg-r2am-core
  mesh_radio: 11g_standard
  mesh_iface: mesh

- vid: 40
  role: dhcp
  name: dhcp
  prefix: 10.248.31.128/27 #replace with dhcp-network-adresses
  ipv6_subprefix: -40
  inbound_filtering: true
  enforce_client_isolation: true
  untagged: true
  assignments:
    vinet-xberg-r2am-core: 1 # Replace with coreroutername

- vid: 42
  role: mgmt
  prefix: 10.248.31.184/29 # replace me
  gateway: 1
  dns: 1
  ipv6_subprefix: 1
  assignments:
    vinet-xberg-r2am-core: 1 # Replace with coreroutername
    vinet-xberg-r2am-beam: 2

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11a_standard__to_merge:
  vinet-xberg-r2am-core: 36-20

# AP-id, wifi-channel, bandwidth, txpower
location__channel_assignments_11g_standard__to_merge:
  vinet-xberg-r2am-core: 13-20
