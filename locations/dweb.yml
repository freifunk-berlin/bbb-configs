---

location: dweb
location_nice: table
latitude: 52.497459
longitude: 13.427857
community: berlin

location__packages__to_merge:
  - snmpd

hosts:
  - hostname: dweb-core
    role: corerouter
    # model: mikrotik_routerboard-750gr3
    model: "x86-64"
    host__rclocal__to_merge:
      - |
        chmod +x /etc/librenms/*.sh
        chmod +x /etc/librenms/distro

# ROUTER: 10.248.120.0/23
# --MGMT: 10.248.120.0/26
# --MESH: 10.248.120.64/26
# --FREE: 10.248.120.128/25
# --DHCP: 10.248.121.0/24
ipv6_prefix: 2001:bf7:831:1600::/56

networks:
  - vid: 30
    role: mesh
    name: mesh_lan_30
    prefix: 10.248.120.65/32
    ipv6_subprefix: -30

  - vid: 40
    name: dhcp
    role: dhcp
    prefix: 10.248.121.0/24
    ipv6_subprefix: 0
    inbound_filtering: true
    enforce_client_isolation: true
    assignments:
      dweb-core: 1

  - vid: 42
    name: mgmt
    role: mgmt
    prefix: 10.248.120.0/26
    ipv6_subprefix: 1
    inbound_filtering: true # to secure the infra from the camp
    gateway: 1
    dns: 1
    assignments:
      dweb-core: 1
      dweb-cloud: 2
      dweb-sw-11: 11 # netpower 16p
      dweb-sw-12: 12 # netpower 16p
      dweb-sw-13: 13 # netpower 16p
      dweb-sw-14: 14 # netpower 16p
      dweb-sw-15: 15 # netpower 16p
      dweb-sw-16: 16 # netpower 16p SPARE
      dweb-sw-17: 17 # CSS610
      dweb-sw-18: 18 # unifi

  - vid: 50
    untagged: true
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.248.120.64/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.248.120.65/32
    wireguard_port: 51821

