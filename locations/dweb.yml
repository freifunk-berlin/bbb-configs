---

location: dweb
location_nice: basement
latitude: 52.11879
longitude: 12.407222
community: berlin

location__packages__to_merge:
  - snmpd

hosts:
  # Lenovo 10T8S00S00 / Thinkcentre M720q, i5-8500T, 16GB RAM, 256GB NVMe
  # Boot prio: 1. USB 2. NVMe
  # eth0      - Intel I219-LM V7
  # eth1 eth2 - Intel X520-DA2 SFP+
  - hostname: dweb-core
    role: corerouter
    model: x86-64
    int_port: eth1

snmp_devices:
  - hostname: dweb-ptp-4
    address: 10.248.120.4
    snmp_profile: routeros

  - hostname: dweb-ptp-5
    address: 10.248.120.5
    snmp_profile: routeros

  - hostname: dweb-sw-11
    address: 10.248.120.11
    snmp_profile: swos

  - hostname: dweb-sw-12
    address: 10.248.120.12
    snmp_profile: swos

  - hostname: dweb-sw-13
    address: 10.248.120.13
    snmp_profile: swos

  - hostname: dweb-sw-14
    address: 10.248.120.14
    snmp_profile: swos

  - hostname: dweb-sw-15
    address: 10.248.120.15
    snmp_profile: swos

  - hostname: dweb-sw-16
    address: 10.248.120.16
    snmp_profile: swos

# ROUTER: 10.248.120.0/23
# --MGMT: 10.248.120.0/27
# --MGMT-APS: 10.248.120.32/27
# --MESH: 10.248.120.64/26
# --DHCP: 10.248.120.128/25 (yolocolo)
# --DHCP: 10.248.121.0/24
ipv6_prefix: 2001:bf7:831:1600::/56

networks:
  - vid: 30
    role: mesh
    name: mesh_lan_30
    prefix: 10.248.120.66/32
    ipv6_subprefix: -30

  - vid: 40
    name: dhcp
    role: dhcp
    prefix: 10.248.121.0/24
    ipv6_subprefix: 0
    inbound_filtering: false
    enforce_client_isolation: false
    assignments:
      dweb-core: 1

  - vid: 41
    name: yolocolo
    role: dhcp
    prefix: 10.248.120.128/25
    ipv6_subprefix: 2
    inbound_filtering: false
    enforce_client_isolation: false
    assignments:
      dweb-core: 1

  - vid: 42
    name: mgmt
    role: mgmt
    prefix: 10.248.120.0/27 # the next /27 is for APs in separate locations
    ipv6_subprefix: 1
    gateway: 1
    dns: 1
    assignments:
      dweb-core: 1
      dweb-cloud: 2
      dweb-app-srv: 3
      dweb-ptp-4: 4
      dweb-ptp-5: 5
      dweb-sw-11: 11 # netpower 16p Resilience Base
      dweb-sw-12: 12 # netpower 16p Solidarity Station (22)
      dweb-sw-13: 13 # netpower 16p Camping (Behind Tent 61)
      dweb-sw-14: 14 # netpower 16p Mesh Nest
      dweb-sw-15: 15 # netpower 16p Hackers Lab
      dweb-sw-16: 16 # netpower 16p SPARE
      dweb-sw-17: 17 # CSS610
      dweb-sw-18: 18 # unifi

#      dweb-ap-32: 32
#      dweb-ap-33: 33
#      dweb-ap-34: 34
#      dweb-ap-35: 35
#      dweb-ap-36: 36
#      dweb-ap-37: 37
#      dweb-ap-38: 38
#      dweb-ap-39: 39

  - vid: 43
    name: stash1
    role: dhcp
    prefix: 10.248.139.0/24
    ipv6_subprefix: 3
    inbound_filtering: false
    enforce_client_isolation: false
    assignments:
      dweb-core: 1

  - vid: 44
    name: stash2
    role: dhcp
    prefix: 10.248.140.0/24
    ipv6_subprefix: 4
    inbound_filtering: false
    enforce_client_isolation: false
    assignments:
      dweb-core: 1

  - vid: 45
    name: stash3
    role: dhcp
    prefix: 10.248.141.0/24
    ipv6_subprefix: 5
    inbound_filtering: false
    enforce_client_isolation: false
    assignments:
      dweb-core: 1

  - vid: 46
    name: stash4
    role: dhcp
    prefix: 10.248.142.0/24
    ipv6_subprefix: 6
    inbound_filtering: false
    enforce_client_isolation: false
    assignments:
      dweb-core: 1

  - vid: 50
    untagged: true
    ifname: eth2
    role: uplink

  - role: tunnel
    ifname: ts_wg0
    mtu: 1280
    prefix: 10.248.120.64/32
    wireguard_port: 51820

  - role: tunnel
    ifname: ts_wg1
    mtu: 1280
    prefix: 10.248.120.65/32
    wireguard_port: 51821

  # Stub network so eth0 is brought up and we get link-local IPv6 connectivity
  - vid: 99
    untagged: true
    ifname: eth0
    role: ext
    name: stub
    prefix: 10.248.120.67/32
    ipv6_subprefix: -99

